<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lọc offer affiliate</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1>Lọc offer affiliate</h1>
        <p>Bảng điều khiển Uppromote / Goaffpro</p>
      </div>
      <div class="status-chip" id="statusChip">Sảnh</div>
    </header>

    <nav class="tabs">
      <button class="tab-btn active" data-tab="settingsTab">Cài đặt</button>
      <button class="tab-btn" data-tab="runUppromoteTab">Uppromote</button>
      <button class="tab-btn" data-tab="runGoaffproTab">Goaffpro</button>
      <button class="tab-btn" data-tab="runRefersionTab">Refersion</button>
      <button class="tab-btn" data-tab="resultsTab">Kết quả</button>
    </nav>

    <section id="settingsTab" class="tab-panel active">
      <div class="card">
        <h2>Cài đặt môi trường</h2>
        <p class="muted">Token Apify dùng chung cho cả hai nguồn.</p>
        <div class="form-grid">
          <label class="form-field-label">
            <span class="form-field-caption">Token Apify (APIFY_TOKEN)</span>
            <div class="secret-field-row" data-secret-for="APIFY_TOKEN">
              <button type="button" class="secret-eye-btn" aria-expanded="false" aria-label="Hiện để chỉnh sửa" title="Hiện / ẩn để sửa">
                <svg class="eye-icon eye-icon--shut" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                <svg class="eye-icon eye-icon--open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
              <input id="APIFY_TOKEN" class="secret-field-input token-apify" type="password" spellcheck="false" autocomplete="off" />
            </div>
          </label>
        </div>
        <h3 class="settings-sub">Uppromote</h3>
        <div class="form-grid">
          <label class="form-field-label">
            <span class="form-field-caption">URL API (UPPROMOTE_API_URL)</span>
            <div class="secret-field-row" data-secret-for="UPPROMOTE_API_URL">
              <button type="button" class="secret-eye-btn" aria-expanded="false" aria-label="Hiện để chỉnh sửa" title="Hiện / ẩn để sửa">
                <svg class="eye-icon eye-icon--shut" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                <svg class="eye-icon eye-icon--open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
              <input id="UPPROMOTE_API_URL" class="secret-field-input" type="password" spellcheck="false" autocomplete="off" />
            </div>
          </label>
          <label class="form-field-label">
            <span class="form-field-caption">Bearer token (UPPROMOTE_BEARER_TOKEN)</span>
            <div class="secret-field-row" data-secret-for="UPPROMOTE_BEARER_TOKEN">
              <button type="button" class="secret-eye-btn" aria-expanded="false" aria-label="Hiện để chỉnh sửa" title="Hiện / ẩn để sửa">
                <svg class="eye-icon eye-icon--shut" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                <svg class="eye-icon eye-icon--open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
              <input id="UPPROMOTE_BEARER_TOKEN" class="secret-field-input token-apify" type="password" spellcheck="false" autocomplete="off" />
            </div>
          </label>
          <label>Số offer mỗi trang (10–50, bước 10)<input id="UPPROMOTE_PER_PAGE" type="number" min="10" max="50" step="10" value="50" /></label>
        </div>
        <h3 class="settings-sub">Goaffpro</h3>
        <div class="form-grid">
          <label class="form-field-label">
            <span class="form-field-caption">URL API (GOAFFPRO_API_URL)</span>
            <div class="secret-field-row" data-secret-for="GOAFFPRO_API_URL">
              <button type="button" class="secret-eye-btn" aria-expanded="false" aria-label="Hiện để chỉnh sửa" title="Hiện / ẩn để sửa">
                <svg class="eye-icon eye-icon--shut" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                <svg class="eye-icon eye-icon--open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
              <input id="GOAFFPRO_API_URL" class="secret-field-input" type="password" spellcheck="false" autocomplete="off" />
            </div>
          </label>
          <label class="form-field-label">
            <span class="form-field-caption">Bearer token (GOAFFPRO_BEARER_TOKEN)</span>
            <div class="secret-field-row" data-secret-for="GOAFFPRO_BEARER_TOKEN">
              <button type="button" class="secret-eye-btn" aria-expanded="false" aria-label="Hiện để chỉnh sửa" title="Hiện / ẩn để sửa">
                <svg class="eye-icon eye-icon--shut" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                <svg class="eye-icon eye-icon--open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
              <input id="GOAFFPRO_BEARER_TOKEN" class="secret-field-input token-apify" type="password" spellcheck="false" autocomplete="off" />
            </div>
          </label>
          <label>Giới hạn mỗi request (10–50, bước 10)<input id="GOAFFPRO_LIMIT" type="number" min="10" max="50" step="10" value="50" /></label>
        </div>
        <h3 class="settings-sub">Refersion</h3>
        <div class="form-grid">
          <label class="form-field-label">
            <span class="form-field-caption">URL API (REFERSION_API_URL)</span>
            <div class="secret-field-row" data-secret-for="REFERSION_API_URL">
              <button type="button" class="secret-eye-btn" aria-expanded="false" aria-label="Hiện để chỉnh sửa" title="Hiện / ẩn để sửa">
                <svg class="eye-icon eye-icon--shut" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                <svg class="eye-icon eye-icon--open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
              <input id="REFERSION_API_URL" class="secret-field-input" type="password" spellcheck="false" autocomplete="off" />
            </div>
          </label>
          <label class="form-field-label">
            <span class="form-field-caption">Token (REFERSION_TOKEN)</span>
            <div class="secret-field-row" data-secret-for="REFERSION_TOKEN">
              <button type="button" class="secret-eye-btn" aria-expanded="false" aria-label="Hiện để chỉnh sửa" title="Hiện / ẩn để sửa">
                <svg class="eye-icon eye-icon--shut" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                <svg class="eye-icon eye-icon--open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
              <input id="REFERSION_TOKEN" class="secret-field-input token-apify" type="password" spellcheck="false" autocomplete="off" />
            </div>
          </label>
        </div>
        <div class="actions">
          <button class="btn primary" id="saveSettingsBtn">Lưu cài đặt</button>
        </div>
      </div>

      <div class="card">
        <h2>Bản quyền</h2>
        <p class="muted" id="licenseMessage">Đang tải trạng thái…</p>
        <div class="form-grid">
          <label>Key kích hoạt<input id="licenseKeyInput" type="text" spellcheck="false" autocomplete="off" placeholder="AFL1-…" /></label>
        </div>
        <div class="actions">
          <button class="btn primary" id="activateLicenseBtn">Kích hoạt</button>
          <button class="btn danger" type="button" id="deactivateLicenseBtn" disabled>Hủy kích hoạt</button>
        </div>
      </div>
    </section>

    <section id="runUppromoteTab" class="tab-panel">
      <div class="card">
        <h2>Chạy — Uppromote</h2>
        <div class="form-grid compact">
          <label>Ngưỡng traffic tối thiểu<input id="minTraffic" type="number" value="9000" /></label>
          <label>Trang bắt đầu<input id="startPage" type="number" min="1" value="1" /></label>
          <label>Trang kết thúc<input id="endPage" type="text" inputmode="numeric" autocomplete="off" placeholder="1 — để trống = tới trang cuối API" /></label>
          <label>Hoa hồng tối thiểu (%)<input id="minCommission" type="number" step="0.01" /></label>
          <label>Ngày cookie tối thiểu<input id="minCookie" type="number" step="1" /></label>
          <label>Tiền tệ<input id="currency" type="text" placeholder="USD" /></label>
          <label>Duyệt đơn
            <select id="applicationReview">
              <option value="">(Tất cả)</option>
              <option value="auto">Tự động</option>
              <option value="manual">Thủ công</option>
            </select>
          </label>
          <label>Tỷ lệ thanh toán tối thiểu (%)<input id="minPayoutRate" type="number" step="0.01" /></label>
          <label>Tỷ lệ duyệt tối thiểu (%)<input id="minApprovalRate" type="number" step="0.01" /></label>
          <div class="filter-field-full">
            <label class="form-field-caption">Danh mục</label>
            <div class="multi-select" data-multi-label="Category">
              <button type="button" class="multi-select-btn" aria-expanded="false" aria-haspopup="listbox">
                <span class="multi-select-btn-text muted-hint">Tất cả</span>
                <span class="multi-select-chevron" aria-hidden="true">▼</span>
              </button>
              <div class="multi-select-panel" id="categoryUppromoteGroup" role="listbox" aria-multiselectable="true">
                <label class="multi-select-option"><input type="checkbox" name="categoryUppromote" value="Art"><span>Art</span></label>
                <label class="multi-select-option"><input type="checkbox" name="categoryUppromote" value="Adult products"><span>Adult products</span></label>
                <label class="multi-select-option"><input type="checkbox" name="categoryUppromote" value="Automobiles &amp; Motorcycles"><span>Automobiles &amp; Motorcycles</span></label>
                <label class="multi-select-option"><input type="checkbox" name="categoryUppromote" value="Baby &amp; Toddler"><span>Baby &amp; Toddler</span></label>
                <label class="multi-select-option"><input type="checkbox" name="categoryUppromote" value="Beauty &amp; Health"><span>Beauty &amp; Health</span></label>
                <label class="multi-select-option"><input type="checkbox" name="categoryUppromote" value="Books"><span>Books</span></label>
                <label class="multi-select-option"><input type="checkbox" name="categoryUppromote" value="Bundles"><span>Bundles</span></label>
                <label class="multi-select-option"><input type="checkbox" name="categoryUppromote" value="Business &amp; Industrial"><span>Business &amp; Industrial</span></label>
                <label class="multi-select-option"><input type="checkbox" name="categoryUppromote" value="Business &amp; Professional services"><span>Business &amp; Professional services</span></label>
                <label class="multi-select-option"><input type="checkbox" name="categoryUppromote" value="Cameras &amp; Optics"><span>Cameras &amp; Optics</span></label>
                <label class="multi-select-option"><input type="checkbox" name="categoryUppromote" value="Computers &amp; Office"><span>Computers &amp; Office</span></label>
                <label class="multi-select-option"><input type="checkbox" name="categoryUppromote" value="Education &amp; Training"><span>Education &amp; Training</span></label>
                <label class="multi-select-option"><input type="checkbox" name="categoryUppromote" value="Electronics"><span>Electronics</span></label>
                <label class="multi-select-option"><input type="checkbox" name="categoryUppromote" value="Fashion"><span>Fashion</span></label>
                <label class="multi-select-option"><input type="checkbox" name="categoryUppromote" value="Furniture"><span>Furniture</span></label>
                <label class="multi-select-option"><input type="checkbox" name="categoryUppromote" value="Gaming"><span>Gaming</span></label>
                <label class="multi-select-option"><input type="checkbox" name="categoryUppromote" value="Garden &amp; Outdoors"><span>Garden &amp; Outdoors</span></label>
                <label class="multi-select-option"><input type="checkbox" name="categoryUppromote" value="Gift Cards"><span>Gift Cards</span></label>
                <label class="multi-select-option"><input type="checkbox" name="categoryUppromote" value="Grocery &amp; Food"><span>Grocery &amp; Food</span></label>
                <label class="multi-select-option"><input type="checkbox" name="categoryUppromote" value="Hardware"><span>Hardware</span></label>
                <label class="multi-select-option"><input type="checkbox" name="categoryUppromote" value="Home &amp; Tools"><span>Home &amp; Tools</span></label>
                <label class="multi-select-option"><input type="checkbox" name="categoryUppromote" value="Jewelry &amp; Accessories"><span>Jewelry &amp; Accessories</span></label>
                <label class="multi-select-option"><input type="checkbox" name="categoryUppromote" value="Luggage &amp; Bags"><span>Luggage &amp; Bags</span></label>
                <label class="multi-select-option"><input type="checkbox" name="categoryUppromote" value="Media"><span>Media</span></label>
                <label class="multi-select-option"><input type="checkbox" name="categoryUppromote" value="Mom &amp; Kids"><span>Mom &amp; Kids</span></label>
                <label class="multi-select-option"><input type="checkbox" name="categoryUppromote" value="Pet supplies"><span>Pet supplies</span></label>
                <label class="multi-select-option"><input type="checkbox" name="categoryUppromote" value="Phone &amp; Telecommunication"><span>Phone &amp; Telecommunication</span></label>
                <label class="multi-select-option"><input type="checkbox" name="categoryUppromote" value="Product Add-Ons"><span>Product Add-Ons</span></label>
                <label class="multi-select-option"><input type="checkbox" name="categoryUppromote" value="Religion &amp; Spirituality"><span>Religion &amp; Spirituality</span></label>
                <label class="multi-select-option"><input type="checkbox" name="categoryUppromote" value="Retail &amp; Consumer goods"><span>Retail &amp; Consumer goods</span></label>
                <label class="multi-select-option"><input type="checkbox" name="categoryUppromote" value="Software &amp; Digital products"><span>Software &amp; Digital products</span></label>
                <label class="multi-select-option"><input type="checkbox" name="categoryUppromote" value="Sports &amp; Entertainment"><span>Sports &amp; Entertainment</span></label>
                <label class="multi-select-option"><input type="checkbox" name="categoryUppromote" value="Tobacco products"><span>Tobacco products</span></label>
                <label class="multi-select-option"><input type="checkbox" name="categoryUppromote" value="Toys &amp; Hobbies"><span>Toys &amp; Hobbies</span></label>
                <label class="multi-select-option"><input type="checkbox" name="categoryUppromote" value="Travel"><span>Travel</span></label>
                <label class="multi-select-option"><input type="checkbox" name="categoryUppromote" value="Vehicles &amp; Parts"><span>Vehicles &amp; Parts</span></label>
                <label class="multi-select-option"><input type="checkbox" name="categoryUppromote" value="Wellness &amp; Lifestyle"><span>Wellness &amp; Lifestyle</span></label>
                <label class="multi-select-option"><input type="checkbox" name="categoryUppromote" value="Others"><span>Others</span></label>
                <label class="multi-select-option"><input type="checkbox" name="categoryUppromote" value="Uncategorized"><span>Uncategorized</span></label>
              </div>
            </div>
          </div>
          <div class="filter-field-full">
            <label class="form-field-caption">Phương thức thanh toán</label>
            <div class="multi-select" data-multi-label="Payment">
              <button type="button" class="multi-select-btn" aria-expanded="false" aria-haspopup="listbox">
                <span class="multi-select-btn-text muted-hint">Tất cả</span>
                <span class="multi-select-chevron" aria-hidden="true">▼</span>
              </button>
              <div class="multi-select-panel" id="paymentMethodUppromoteGroup" role="listbox" aria-multiselectable="true">
                <label class="multi-select-option"><input type="checkbox" name="paymentMethodUppromote" value="paypal"><span>Paypal</span></label>
                <label class="multi-select-option"><input type="checkbox" name="paymentMethodUppromote" value="bank"><span>Bank transfer</span></label>
                <label class="multi-select-option"><input type="checkbox" name="paymentMethodUppromote" value="debit"><span>Debit card</span></label>
                <label class="multi-select-option"><input type="checkbox" name="paymentMethodUppromote" value="cheque"><span>Check</span></label>
                <label class="multi-select-option"><input type="checkbox" name="paymentMethodUppromote" value="venmo"><span>Venmo</span></label>
                <label class="multi-select-option"><input type="checkbox" name="paymentMethodUppromote" value="paytm"><span>PayTM</span></label>
                <label class="multi-select-option"><input type="checkbox" name="paymentMethodUppromote" value="upi"><span>UPI</span></label>
                <label class="multi-select-option"><input type="checkbox" name="paymentMethodUppromote" value="store_credit"><span>Store credit</span></label>
                <label class="multi-select-option"><input type="checkbox" name="paymentMethodUppromote" value="other"><span>Other</span></label>
              </div>
            </div>
          </div>
        </div>

        <div class="actions">
          <button class="btn primary" id="runBtnUppromote">Lọc &amp; xuất Excel</button>
          <button class="btn" id="pauseBtn" disabled>Tạm dừng</button>
          <button class="btn danger" id="stopBtn" disabled>Dừng</button>
        </div>

        <div class="progress-wrap">
          <div class="progress-bar"><div id="progressInner"></div></div>
          <span id="progressText">0%</span>
        </div>

        <div class="log-box" id="logBox"></div>
      </div>
    </section>

    <section id="runGoaffproTab" class="tab-panel">
      <div class="card">
        <h2>Chạy — Goaffpro</h2>
        <div class="form-grid compact">
          <label>Ngưỡng traffic tối thiểu<input id="minTrafficGp" type="number" value="9000" /></label>
          <label>Trang bắt đầu<input id="startPageGp" type="number" min="1" value="1" /></label>
          <label>Trang kết thúc<input id="endPageGp" type="text" inputmode="numeric" autocomplete="off" placeholder="1 — để trống = tới trang cuối API" /></label>
          <label>Hoa hồng tối thiểu (%)<input id="minCommissionGp" type="number" step="0.01" /></label>
          <label>Ngày cookie tối thiểu<input id="minCookieGp" type="number" step="1" /></label>
          <label>Tiền tệ<input id="currencyGp" type="text" placeholder="USD" /></label>
          <label>Duyệt đơn
            <select id="applicationReviewGp">
              <option value="">(Tất cả)</option>
              <option value="auto">Tự động</option>
              <option value="manual">Thủ công</option>
            </select>
          </label>
        </div>

        <div class="actions">
          <button class="btn primary" id="runBtnGoaffpro">Lọc &amp; xuất Excel</button>
          <button class="btn" id="pauseBtnGp" disabled>Tạm dừng</button>
          <button class="btn danger" id="stopBtnGp" disabled>Dừng</button>
        </div>

        <div class="progress-wrap">
          <div class="progress-bar"><div id="progressInnerGp"></div></div>
          <span id="progressTextGp">0%</span>
        </div>

        <div class="log-box" id="logBoxGp"></div>
      </div>
    </section>

    <section id="runRefersionTab" class="tab-panel">
      <div class="card">
        <h2>Chạy — Refersion</h2>
        <div class="form-grid compact">
          <label>Ngưỡng traffic tối thiểu<input id="minTrafficRf" type="number" value="9000" /></label>
          <label>Trang bắt đầu<input id="startPageRf" type="number" min="1" value="1" /></label>
          <label>Trang kết thúc<input id="endPageRf" type="text" inputmode="numeric" autocomplete="off" placeholder="1 — để trống = tới trang cuối API" /></label>
          <label>Hoa hồng tối thiểu (%)<input id="minCommissionRf" type="number" step="0.01" /></label>
          <label>Ngày cookie tối thiểu<input id="minCookieRf" type="number" step="1" /></label>
          <label>Tiền tệ<input id="currencyRf" type="text" placeholder="$ hoặc USD" /></label>
        </div>

        <div class="actions">
          <button class="btn primary" id="runBtnRefersion">Lọc &amp; xuất Excel</button>
          <button class="btn" id="pauseBtnRf" disabled>Tạm dừng</button>
          <button class="btn danger" id="stopBtnRf" disabled>Dừng</button>
        </div>

        <div class="progress-wrap">
          <div class="progress-bar"><div id="progressInnerRf"></div></div>
          <span id="progressTextRf">0%</span>
        </div>

        <div class="log-box" id="logBoxRf"></div>
      </div>
    </section>

    <section id="resultsTab" class="tab-panel">
      <div class="card">
        <div class="results-head">
          <h2>File kết quả</h2>
          <button class="btn" id="refreshResultsBtn">Làm mới</button>
        </div>
        
        <div class="file-list" id="resultFileList">
        </div>
      </div>
    </section>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
